services:
  postgres:
    image: postgres:16-alpine
    container_name: ams-postgres
    environment:
      POSTGRES_USER: ams
      POSTGRES_PASSWORD: ams
      POSTGRES_DB: ams_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ams -d ams_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
